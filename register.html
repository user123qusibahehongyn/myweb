<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 宠物领养系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <div class="container">
            <div class="logo">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20pet%20adoption%20logo%20with%20cat%20and%20dog&image_size=square" alt="宠物领养网站">
                <span>宠物领养网站</span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="#">领养须知</a></li>
                    <li><a href="#">领养宠物服务</a></li>
                    <li><a href="#">宠物小知识</a></li>
                </ul>
            </nav>
            <div class="user">
                <a href="#" class="login-btn">登录</a>
                <a href="#" class="register-btn">注册</a>
            </div>
        </div>
    </header>

    <!-- 登录模态框 -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>用户登录</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">账号</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group captcha">
                    <label for="captcha">验证码</label>
                    <input type="text" id="captcha" name="captcha" required>
                    <img src="" alt="验证码">
                </div>
                <button type="submit" class="submit-btn">登录</button>
                <p class="register-link"><a href="#" onclick="showRegisterModal()">用户注册</a></p>
            </form>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div id="register-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>用户注册</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-username">账号</label>
                    <input type="text" id="reg-username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">密码</label>
                    <input type="password" id="reg-password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="reg-phone">手机号</label>
                    <input type="tel" id="reg-phone" name="phone" required>
                </div>
                <div class="form-group captcha">
                    <label for="reg-captcha">验证码</label>
                    <input type="text" id="reg-captcha" name="captcha" required>
                    <img src="" alt="验证码">
                </div>
                <button type="submit" class="submit-btn">注册</button>
                <p class="login-link"><a href="#" onclick="showLoginModal()">已有账号？立即登录</a></p>
            </form>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 宠物领养系统 版权所有</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // 页面加载时自动显示注册模态框
        document.addEventListener('DOMContentLoaded', function() {
            showRegisterModal();
        });
    </script>
</body>
</html>
